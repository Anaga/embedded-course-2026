; =============================================================
; Lesson 15 -- RP2350 USB Blink Demo
; Fundamentals of C++ for Microcontrollers
; =============================================================
;
; Board : RP2350 USB dongle (RP2350A-based)
; Core  : ARM Cortex-M33 @ 150 MHz  (default)
; SDK   : Pico SDK via earlephilhower Arduino-Pico wrapper
;
; NOTE: We use framework = arduino as a BUILD wrapper only.
;       All application code uses native Pico SDK API calls
;       (gpio_init, gpio_put, sleep_ms, etc.).
;       The Arduino core transparently links the Pico SDK
;       and provides USB CDC serial out of the box.

[env:rp2350_usb]
platform  = https://github.com/maxgerhardt/platform-raspberrypi.git
board     = rpipico2
framework = arduino

board_build.core = earlephilhower

; --- Architecture selection --------------------------------
; Default: ARM Cortex-M33.  Uncomment for RISC-V Hazard3:
; board_build.mcu = rp2350-riscv

; --- Serial monitor ----------------------------------------
monitor_speed = 115200

; --- Windows long-path workaround --------------------------
; If the first build fails with "Filename too long":
;   1. Run:  git config --system core.longpaths true
;   2. Enable Win32 Long Paths via Group Policy Editor
;      (gpedit.msc -> Computer Config -> Admin Templates
;       -> System -> Filesystem -> Enable Win32 long paths)
;   3. Reboot and rebuild.
