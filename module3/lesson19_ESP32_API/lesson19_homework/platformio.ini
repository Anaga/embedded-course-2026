[env:lolin_c3_mini]
platform  = espressif32
board     = lolin_c3_mini
framework = arduino

monitor_speed  = 115200
monitor_filters = esp32_exception_decoder

build_flags = -std=gnu++17
build_unflags = -std=gnu++11

lib_deps =
    bblanchon/ArduinoJson @ ^7.0.0
    adafruit/Adafruit NeoPixel @ ^1.12.3
